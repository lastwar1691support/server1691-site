<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Sent</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 40px;
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h1 {
      color: #22c55e;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      color: #cbd5e1;
      margin-bottom: 25px;
    }

    a {
      display: inline-block;
      background: #22c55e;
      color: #0f172a;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: bold;
    }

    a:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Thank you!</h1>
    <p>Your request has been sent successfully.</p>
    <p>We have received your application and will review it soon.</p>
    <a href="index.html">Back to Form</a>
  </div>
</body>
</html>
